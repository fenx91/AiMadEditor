<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HyperFrames Render Template</title>
    <!-- GSAP for animations if needed -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover;
            display: block;
        }

        /* Overlay captions/watermark for style */
        #hud {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            display: none; /* Hide in final render unless debugging */
        }
        
        #hud-time {
            color: #00f2fe;
            font-weight: bold;
        }

        #lyrics-container {
            color: #e5e5e5;
            font-size: 28px;
            font-weight: 500;
            font-family: 'Garamond', 'Georgia', serif;
            letter-spacing: 0.15em;
            text-transform: lowercase;
            opacity: 0.9;
            text-shadow: 0 0 5px rgba(0,0,0,0.8), 0 0 2px rgba(0,0,0,0.95);
            text-align: center;
        }
    </style>

<style>
#lyrics-container {
    font-family: 'Garamond', 'Georgia', 'Times New Roman', serif;
    font-size: 36px; 
    font-style: italic;    
    text-transform: lowercase;     
    /* 适度拉开字母间距 */
    letter-spacing: 0.15em;
    color: #e5e5e5;
    text-shadow: 3px 2px 1px rgba(0,0,0,0.8);
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
}
</style>
</head>
<body>

<div id="viewport" data-composition-id="mv" data-width="1920" data-height="1080" data-start="0" data-duration="20.0">
    <video class="video-layer" id="video_0" src="temp_video_0.mp4" data-start="0.0" data-duration="0.47999999999998977" preload="auto" muted></video>
    <video class="video-layer" id="video_1" src="temp_video_1.mp4" data-start="0.47999999999998977" data-duration="1.3400000000000034" preload="auto" muted></video>
    <video class="video-layer" id="video_2" src="temp_video_2.mp4" data-start="1.8199999999999932" data-duration="2.5600000000000023" preload="auto" muted></video>
    <video class="video-layer" id="video_3" src="temp_video_3.mp4" data-start="4.3799999999999955" data-duration="1.259999999999991" preload="auto" muted></video>
    <video class="video-layer" id="video_4" src="temp_video_4.mp4" data-start="5.639999999999986" data-duration="1.2600000000000193" preload="auto" muted></video>
    <video class="video-layer" id="video_5" src="temp_video_5.mp4" data-start="6.900000000000006" data-duration="2.829999999999984" preload="auto" muted></video>
    <video class="video-layer" id="video_6" src="temp_video_6.mp4" data-start="9.72999999999999" data-duration="2.3700000000000045" preload="auto" muted></video>
    <video class="video-layer" id="video_7" src="temp_video_7.mp4" data-start="12.099999999999994" data-duration="2.5800000000000125" preload="auto" muted></video>
    <video class="video-layer" id="video_8" src="temp_video_8.mp4" data-start="14.680000000000007" data-duration="2.5600000000000023" preload="auto" muted></video>
    <video class="video-layer" id="video_9" src="temp_video_9.mp4" data-start="17.24000000000001" data-duration="2.1999999999999886" preload="auto" muted></video>
    <video class="video-layer" id="video_10" src="temp_video_10.mp4" data-start="19.439999999999998" data-duration="0.5600000000000023" preload="auto" muted></video>
    <audio class="dialogue-layer" id="dialogue_video_0" src="temp_dialogue_0.mp4" data-start="0.9000000000000057" data-duration="8.799999999999983" preload="auto" volume="5.0" data-volume="5.0" data-track-index="2"></audio>
    <audio class="dialogue-layer" id="dialogue_video_1" src="temp_dialogue_1.mp4" data-start="13.0" data-duration="7.0" preload="auto" volume="5.0" data-volume="5.0" data-track-index="2"></audio>
    <!-- Transition overlays -->
    <div id="transition-overlay" style="position: absolute; inset: 0; pointer-events: none; z-index: 15; display: none; opacity: 0; background-color: #ffffff;"></div>
    <div id="whip-streak" style="position: absolute; top: 0; left: 0; width: 120%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent); display: none; pointer-events: none; z-index: 16; transform: translateX(-120%);"></div>
    
    <!-- Double Subtitles Overlay -->
    <div id="dialogue-container" style="position: absolute; top: 10%; left: 50%; transform: translateX(-50%); z-index: 999; color: #ffffff; font-size: 36px; font-weight: 600; font-family: 'Noto Serif CJK SC', 'Source Han Serif SC', '思源宋体', 'Noto Serif SC', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; text-shadow: 0 0 10px rgba(0,0,0,0.95), 0 0 4px rgba(0,0,0,0.95); text-align: center; pointer-events: none; max-width: 96%; white-space: nowrap; letter-spacing: 0.03em; display: none;"></div>
    <div id="lyrics-container" style="position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); z-index: 999; pointer-events: none; max-width: 80%; line-height: 1.4; display: none; font-family: 'Garamond', 'Georgia', 'Times New Roman', serif;
    font-size: 36px; 
    font-style: italic;    
    text-transform: lowercase;     
    /* 适度拉开字母间距 */
    letter-spacing: 0.15em;
    color: #e5e5e5;
    text-shadow: 3px 2px 1px rgba(0,0,0,0.8);
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);"></div>
</div>

<audio id="bg-audio" src="audio_test_190_210.mp3" data-start="0" data-duration="20.0" data-track-index="0" data-volume="0.3"></audio></audio>

<div id="hud">
    <div>TIME: <span id="hud-time">0.00s</span></div>
    <div id="hud-clip">CLIP: None</div>
</div>

<script>
    // Force HyperFrames screenshot mode for video playback compatibility
    if (false) { requestAnimationFrame(); }

    let renderData = null;
    let videoElements = [];
    let dialogueVideoElements = [];
    let isPlaying = false;
    let globalTime = 0;
    let audio = null;
    let currentShowingIndex = -1;
    let mainTimeline = null;
    
    // We fetch render_data_test_190_210.json
    async function loadRenderData() {
        try {
            const response = await fetch('render_data_test_190_210.json');
            renderData = await response.json();
            initTemplate();
        } catch (e) {
            console.error("Error loading render data:", e);
            document.body.innerHTML = `<h1 style="color:red; text-align:center; padding:100px;">Failed to load render_data_test_190_210.json</h1>`;
        }
    }

    const isRendering = navigator.userAgent.includes("Headless");

    function initTemplate() {
        const viewport = document.getElementById('viewport');
        videoElements = [];
        dialogueVideoElements = [];
        currentShowingIndex = -1;
        
        // Set metadata attributes for HyperFrames renderer compatibility
        viewport.setAttribute('data-composition-id', 'mv');
        viewport.setAttribute('data-width', '1920'); // 1920x1080 landscape
        viewport.setAttribute('data-height', '1080');
        viewport.setAttribute('data-duration', renderData.duration || '10');
        
        // Setup Audio if present (for real-time browser preview)
        if (renderData.audioPath) {
            audio = document.getElementById('bg-audio');
            const currentSrc = audio.getAttribute('src');
            if (!currentSrc || currentSrc === 'audio.mp3' || currentSrc === 'audio.wav') {
                const ext = renderData.audioPath.split('.').pop();
                audio.src = 'audio.' + ext;
            }
            audio.load();
            audio.volume = renderData.musicVolume !== undefined ? renderData.musicVolume : 1.0;
        }

        // Retrieve static Video Elements from DOM (from viewport container)
        videoElements = Array.from(viewport.querySelectorAll('video.video-layer'));
        videoElements.forEach((video) => {
            video.load();
        });

        // Retrieve static dialogue elements
        dialogueVideoElements = Array.from(viewport.querySelectorAll('audio.dialogue-layer, video.dialogue-layer'));
        dialogueVideoElements.forEach((el) => {
            el.load();
        });

        // Build transition timeline
        mainTimeline = gsap.timeline({ paused: true });
        mainTimeline.to({}, { duration: renderData.duration || 10 }, 0);
        
        // Reset all layers at time 0 (with special handling for the active slot at t=0 to avoid GSAP timeline conflicts)
        videoElements.forEach((v, index) => {
            const slot = renderData.slots[index];
            if (slot && slot.startTime === 0) {
                mainTimeline.set(v, { display: 'block', zIndex: 10, opacity: 1, filter: 'blur(0px)' }, 0);
            } else {
                mainTimeline.set(v, { display: 'none', zIndex: 1, opacity: 0, filter: 'blur(0px)' }, 0);
            }
        });
        mainTimeline.set('#transition-overlay', { display: 'none', opacity: 0, backgroundColor: '#ffffff' }, 0);
        mainTimeline.set('#whip-streak', { display: 'none', xPercent: -120, opacity: 0 }, 0);

        for (let i = 0; i < renderData.slots.length; i++) {
            const slot = renderData.slots[i];
            const video = videoElements[i];
            const trans = slot.transition || "none";
            
            let start = slot.startTime;
            let end = slot.endTime;
            
            if (i > 0 && trans && trans !== "none") {
                const prevSlot = renderData.slots[i - 1];
                const prevVideo = videoElements[i - 1];
                
                if (trans === "cross-fade") {
                    const dur = 0.15;
                    mainTimeline.set(video, { display: 'block', zIndex: 11, opacity: 0 }, start - dur / 2);
                    mainTimeline.to(video, { opacity: 1, duration: dur, ease: 'none' }, start - dur / 2);
                    mainTimeline.set(prevVideo, { display: 'block', zIndex: 10 }, start - dur / 2);
                    mainTimeline.set(prevVideo, { display: 'none', zIndex: 1 }, start + dur / 2);
                } 
                else if (trans === "whip-pan") {
                    const dur = 0.3;
                    mainTimeline.set('#whip-streak', { display: 'block', xPercent: -120, opacity: 0 }, start - dur / 2);
                    mainTimeline.to('#whip-streak', { xPercent: 120, opacity: 1, duration: dur, ease: 'power2.inOut' }, start - dur / 2);
                    mainTimeline.set('#whip-streak', { display: 'none' }, start + dur / 2);
                    
                    mainTimeline.set(prevVideo, { filter: 'blur(0px)' }, start - dur / 2);
                    mainTimeline.to(prevVideo, { filter: 'blur(15px)', duration: dur / 2, ease: 'power2.in' }, start - dur / 2);
                    mainTimeline.set(prevVideo, { display: 'none', zIndex: 1, filter: 'blur(0px)' }, start);
                    
                    mainTimeline.set(video, { display: 'block', zIndex: 10, filter: 'blur(15px)', opacity: 1 }, start);
                    mainTimeline.to(video, { filter: 'blur(0px)', duration: dur / 2, ease: 'power2.out' }, start);
                }
                else if (trans === "flash-through-white") {
                    const dur = 0.4;
                    mainTimeline.set('#transition-overlay', { display: 'block', backgroundColor: '#ffffff', opacity: 0 }, start - 0.15);
                    mainTimeline.to('#transition-overlay', { opacity: 1, duration: 0.15, ease: 'power1.in' }, start - 0.15);
                    mainTimeline.to('#transition-overlay', { opacity: 0, duration: 0.25, ease: 'power1.out' }, start);
                    mainTimeline.set('#transition-overlay', { display: 'none' }, start + 0.25);
                    
                    mainTimeline.set(prevVideo, { display: 'none', zIndex: 1 }, start);
                    mainTimeline.set(video, { display: 'block', zIndex: 10, opacity: 1 }, start);
                }
            } else {
                // Only set visible if start > 0 to prevent conflicting GSAP set tweens at time 0
                if (start > 0) {
                    mainTimeline.set(video, { display: 'block', zIndex: 10, opacity: 1 }, start);
                }
                if (i > 0) {
                    const prevVideo = videoElements[i - 1];
                    mainTimeline.set(prevVideo, { display: 'none', zIndex: 1 }, start);
                }
            }
            
            // Only hide at the end if the next slot doesn't have a transition that extends its lifecycle
            let hasNextTransition = false;
            if (i < renderData.slots.length - 1) {
                const nextSlot = renderData.slots[i + 1];
                const nextTrans = nextSlot.transition || "none";
                if (nextTrans !== "none") {
                    hasNextTransition = true;
                }
            }
            if (!hasNextTransition) {
                mainTimeline.set(video, { display: 'none', zIndex: 1 }, end);
            }
        }

        // Register composition timeline
        window.__timelines = window.__timelines || {};
        if (isRendering) {
            mainTimeline.eventCallback("onUpdate", function() {
                updateTimeline(mainTimeline.time(), true);
            });
            window.__timelines['mv'] = mainTimeline;
        } else {
            // Register custom seek adapter for browser preview
            window.__timelines['mv'] = {
                seek: function(time) {
                    return window.seekTo(time);
                }
            };
        }

        // Show HUD if debugging or if run in non-headless browser
        if (!isRendering) {
            document.getElementById('hud').style.display = 'block';
            setupKeyboardControls();
        }
        
        // Expose seekTo function
        window.seekTo = function(time) {
            globalTime = time;
            return updateTimeline(time);
        };

        // Initial draw
        updateTimeline(0);
    }

    function getActiveSlotIndex(time) {
        if (!renderData) return -1;
        return renderData.slots.findIndex(s => time >= s.startTime && time < s.endTime);
    }

    function updateTimeline(time, fromTimelineEvent = false) {
        if (!renderData) return Promise.resolve();
        
        if (mainTimeline && !fromTimelineEvent) {
            mainTimeline.seek(time);
        }
        
        const activeIndex = getActiveSlotIndex(time);
        const activeDialogueIndex = renderData.dialogueClips ? renderData.dialogueClips.findIndex(d => time >= d.startTime && time < d.endTime) : -1;
        console.log(`[updateTimeline] time=${time.toFixed(3)} isRendering=${isRendering} activeIndex=${activeIndex} activeDialogueIndex=${activeDialogueIndex}`);
        
        document.getElementById('hud-time').textContent = time.toFixed(2) + 's';
        
        // Update BGM lyrics overlay dynamically
        const lyricsDiv = document.getElementById('lyrics-container');
        if (lyricsDiv) {
            if (renderData.lyrics && renderData.lyrics.length > 0) {
                const activeLyric = renderData.lyrics.find(l => !l.is_intro && time >= l.start && time < l.end);
                if (activeLyric) {
                    lyricsDiv.textContent = activeLyric.text;
                    lyricsDiv.style.display = 'block';
                } else {
                    lyricsDiv.style.display = 'none';
                }
            } else {
                lyricsDiv.style.display = 'none';
            }
        }
        
        const targetMusicVolume = renderData.musicVolume !== undefined ? renderData.musicVolume : 1.0;
        const targetDialogueVolume = renderData.dialogueVolume !== undefined ? renderData.dialogueVolume : 1.0;

        // Update dialogue subtitles overlay dynamically
        const dialogueDiv = document.getElementById('dialogue-container');
        if (dialogueDiv) {
            let showDialogue = false;
            let dialogueText = '';
            let speaker = '';
            
            if (activeDialogueIndex !== -1) {
                const d_clip = renderData.dialogueClips[activeDialogueIndex];
                if (d_clip.transcript) {
                    showDialogue = true;
                    dialogueText = d_clip.transcript;
                    speaker = d_clip.speaker;
                }
            } else if (activeIndex !== -1) {
                const slot = renderData.slots[activeIndex];
                if (slot.keepAudio && slot.transcript) {
                    showDialogue = true;
                    dialogueText = slot.transcript;
                    speaker = slot.speaker;
                }
            }
            
            if (showDialogue) {
                dialogueDiv.textContent = dialogueText;
                dialogueDiv.style.display = 'block';
                
                const spk = (speaker || '').toLowerCase();
                if (spk === 'tayama') {
                    dialogueDiv.style.color = '#00f2fe';
                } else if (spk === 'sasaki') {
                    dialogueDiv.style.color = '#ffcc00';
                } else if (spk === 'yamada') {
                    dialogueDiv.style.color = '#ff80bf';
                } else {
                    dialogueDiv.style.color = '#ffffff';
                }
                dialogueDiv.style.textShadow = '0 0 10px rgba(0,0,0,0.95), 0 0 4px rgba(0,0,0,0.95)';
            } else {
                dialogueDiv.style.display = 'none';
            }
        }

        // Active slot HUD display
        if (activeIndex !== -1) {
            const slot = renderData.slots[activeIndex];
            const filename = slot.videoPath.split(/[/\\]/).pop();
            const clipTime = time - slot.startTime;
            document.getElementById('hud-clip').textContent = `CLIP: ${filename} (at ${clipTime.toFixed(2)}s)`;
        } else {
            document.getElementById('hud-clip').textContent = `CLIP: None`;
        }

        // Synchronize video player audio volume and playback position in real-time
        if (isRendering) {
            // Headless render: sync volumes to let the capture engine mix them correctly
            videoElements.forEach((video, index) => {
                const slot = renderData.slots[index];
                if (video.style.display === 'block') {
                    if (slot.keepAudio) {
                        video.muted = false;
                        video.volume = Math.max(0, Math.min(1, targetDialogueVolume));
                    } else {
                        video.muted = true;
                    }
                } else {
                    video.muted = true;
                }
            });
        } else {
            // Browser preview mode: sync audio volume, currentTime, and play/pause based on visible DOM state
            videoElements.forEach((video, index) => {
                const slot = renderData.slots[index];
                const clipTime = time - slot.startTime;
                
                if (video.style.display === 'block') {
                    if (slot.keepAudio) {
                        video.muted = false;
                        video.volume = Math.max(0, Math.min(1, targetDialogueVolume));
                    } else {
                        video.muted = true;
                    }
                    
                    const duration = video.duration;
                    if (!isNaN(duration) && duration > 0) {
                        const timeDiff = Math.abs(video.currentTime - clipTime);
                        if (timeDiff > 0.45) {
                            video.currentTime = clipTime;
                        }
                    }
                    
                    if (isPlaying) {
                        video.play().catch(e => {});
                    } else {
                        video.pause();
                    }
                } else {
                    if (!video.paused) video.pause();
                    video.muted = true;
                }
            });
        }

        // Playback controls for independent dialogue clips (browser preview mode)
        if (renderData.dialogueClips && !isRendering) {
            dialogueVideoElements.forEach((d_video, idx) => {
                const d_clip = renderData.dialogueClips[idx];
                if (idx === activeDialogueIndex) {
                    d_video.muted = false;
                    d_video.volume = targetDialogueVolume;
                    
                    const clipTime = time - d_clip.startTime;
                    const duration = d_video.duration;
                    if (!isNaN(duration) && duration > 0) {
                        const timeDiff = Math.abs(d_video.currentTime - clipTime);
                        if (timeDiff > 0.45) {
                            d_video.currentTime = clipTime;
                        }
                    }
                    if (isPlaying) {
                        d_video.play().catch(e => {});
                    } else {
                        d_video.pause();
                    }
                } else {
                    d_video.muted = true;
                    if (!d_video.paused) d_video.pause();
                }
            });
        }
        
        if (audio) {
            audio.volume = targetMusicVolume;
        }
        
        return Promise.resolve();
    }

    function showActiveVideo(activeIndex) {
        if (currentShowingIndex === activeIndex) return;
        
        videoElements.forEach((video, index) => {
            if (index === activeIndex) {
                video.style.display = 'block';
                video.style.zIndex = '10';
                if (isPlaying) {
                    video.play().catch(e => {});
                }
            } else {
                video.style.display = 'none';
                video.style.zIndex = '1';
                if (!video.paused) video.pause();
                video.muted = true; // Ensure inactive videos are muted
            }
        });
        currentShowingIndex = activeIndex;
    }

    // Keyboard controls for manual preview in normal browser
    function setupKeyboardControls() {
        let playInterval = null;
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isPlaying) {
                    isPlaying = false;
                    if (audio) audio.pause();
                    clearInterval(playInterval);
                    updateTimeline(globalTime);
                } else {
                    isPlaying = true;
                    if (audio) {
                        audio.currentTime = globalTime;
                        audio.play().catch(err => console.log(err));
                    }
                    
                    const startRealTime = Date.now() - (globalTime * 1000);
                    playInterval = setInterval(() => {
                        globalTime = (Date.now() - startRealTime) / 1000;
                        if (globalTime >= renderData.duration) {
                            globalTime = 0;
                            isPlaying = false;
                            if (audio) audio.pause();
                            clearInterval(playInterval);
                        }
                        updateTimeline(globalTime);
                    }, 1000 / 60); // 60fps clock
                }
            }
        });
    }

    window.addEventListener('DOMContentLoaded', loadRenderData);
</script>
</body>
</html>
